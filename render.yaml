services:
  - type: web
    name: dsa-app
    runtime: node
    buildCommand: npm install
    startCommand: npm run db:migrate && npm run db:seed && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dsa-db
          property: connectionString

databases:
  - name: dsa-db
    plan: free
